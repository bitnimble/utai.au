# utai.au dev harness for the music-source (OnTheSpot) feature. NOT for production.
#
# Brings up four services behind Caddy (the app on one origin, OnTheSpot's UI on
# a second):
#   - onthespot : OnTheSpot's headless web API (the thing we wrap)
#   - backend   : the aligner (torch-free `docker/backend.Dockerfile`). ONE service
#                 for both the music facade AND the ML pipeline (vocal separation +
#                 CTC alignment), `pipeline` role with GPU + a model-cache mount
#                 (see the backend service). Runs only pre-exported onnx, so it
#                 needs the models present to start (can't export -- no torch).
#   - web       : the Vite dev server over a repo bind-mount (edit -> refresh)
#   - caddy     : edge proxy; :5175 /api -> backend + / -> web; :5176 -> onthespot
#
# Run:   docker compose -f docker-compose.dev.yml up --build
# Then:  open https://localhost:5175  (self-signed; refresh to pick up changes).
#        HTTPS is required so AudioWorklet (audio playback) works off localhost.
#
# First run is heavy: the backend builds `docker/backend.Dockerfile`, a CUDA image
# carrying the aligner's torch-free onnxruntime stack (no torch, unlike the
# `utai-sandbox` image `scripts/sandbox-*` use). Accounts/credentials live only in
# the `otsconfig` volume.

services:
  onthespot:
    build:
      context: .
      dockerfile: docker/onthespot.Dockerfile
    image: utai-onthespot
    restart: unless-stopped
    environment:
      ONTHESPOTDIR: /config
    volumes:
      - otsconfig:/config
      - otsdownloads:/root/Music
    expose:
      - "5000"

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    image: utai-backend
    restart: unless-stopped
    working_dir: /repo/aligner
    # Run as root (the sandbox image defaults to uid 1000): the `otsconfig`
    # volume is shared with the root `onthespot` container, and the facade must
    # write music_config.json + seed the YouTube Music account into it. Same-uid
    # avoids a permission clash. The image sets PYTHONDONTWRITEBYTECODE=1, so no
    # root-owned __pycache__ leaks onto the bind-mounted source.
    user: "0:0"
    # Mount the whole repo (a subdir bind of ./aligner came up EMPTY on this
    # Docker) and run uvicorn as a module from /repo/aligner so cwd + PYTHONPATH
    # put the app source on sys.path; the backend image installs the deps only.
    # Hot-reload is off on purpose: a restart re-runs the startup lifespan, which
    # re-provisions (update-checks every model) and re-warms the separator, so an
    # edit-triggered reload is slow. Apply backend edits with an explicit
    # `docker compose -f docker-compose.dev.yml restart backend`.
    command: sh -c "cd /repo/aligner && exec /opt/venv/bin/python -m uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      PYTHONPATH: /repo/aligner
      # ONE service runs both the music API and the ML pipeline (vocal
      # separation + CTC forced alignment), matching the sidecar. The `pipeline`
      # role provisions the startup model set + warms the separator in a
      # background task (uvicorn accepts connections immediately, so the web
      # frontend's startup gate can poll /provision/status); music routes work in
      # any role.
      WORKER_ROLE: pipeline
      MODELS_DIR: /models
      # Capabilities eagerly provisioned at startup (download + ETag update-check
      # against `onnx_repo`). Default is lyrics,pitch (every model); set here for
      # visibility. Any pre-mounted `/models` weights are adopted (size match) or
      # update-checked rather than re-downloaded.
      STARTUP_CAPABILITIES: lyrics,pitch
      # Runtime is torch-free onnxruntime (the only shipped path). On this box
      # separation rides the TensorRT EP automatically (the backend image carries
      # the tensorrt-cu12 wheel and UTAI_SEP_TRT defaults on); its engine builds
      # once and caches under /cache. MODELS_DIR must hold the exported `.onnx`
      # bodies (`model_mel_band_roformer.fp16.onnx` + `ctc_align__*.fp16.onnx`)
      # AND the separator's `config_mel_band_roformer.yaml`.
      HF_HOME: /hf-cache
      ONTHESPOT_BASE_URL: http://onthespot:5000
      ONTHESPOT_CONFIG_PATH: /config/otsconfig.json
      MUSIC_CONFIG_PATH: /config/music_config.json
    # GPU for separation + CTC (modern Compose; older Compose uses
    # deploy.resources.reservations.devices with the nvidia driver).
    gpus: all
    volumes:
      - ${REPO_PATH:-.}:/repo
      - otsconfig:/config
      # Persistent model cache. Startup provisioning downloads whatever's missing
      # here from `onnx_repo` (and update-checks what's present), so an empty dir
      # just means a one-time download on first `up`; a pre-populated onnx-export
      # dir is adopted as-is. Kept on a host path so downloads survive `down`.
      - ${MODELS_PATH:-/codebox-workspace/utai/onnx-export}:/models
      - aligncache:/cache
      - hfcache:/hf-cache
    expose:
      - "8000"
    depends_on:
      - onthespot

  web:
    image: oven/bun:1.3.14
    restart: unless-stopped
    working_dir: /repo
    # Run the project's Vite (bunx resolves the local pinned v6 from the mounted
    # node_modules). Runs as the host uid so writes over the bind-mount aren't
    # root-owned; VITE_CACHE_DIR keeps the dep-optimizer cache off the mount.
    command: sh -c "cd /repo && exec bunx vite --host 0.0.0.0 --port 5174"
    user: "1000:1000"
    environment:
      HOME: /tmp
      # Origin-relative /api (Caddy serves it on this same origin).
      VITE_ALIGNER_URL: ""
      # Keep Vite's dep-optimizer cache off the (possibly read-only-ish) mount.
      VITE_CACHE_DIR: /tmp/utai-vite
    volumes:
      - ${REPO_PATH:-.}:/repo
    # Reachable by Caddy over the compose network only; NOT published to the host
    # (the host's 5174 is typically taken by a hand-run `bun run dev`). Browse the
    # app through Caddy on :5175.
    expose:
      - "5174"

  caddy:
    build:
      context: .
      dockerfile: docker/caddy.Dockerfile
    image: utai-caddy
    restart: unless-stopped
    ports:
      - "5175:5175"
      # OnTheSpot's own web UI, its own origin (see docker/Caddyfile), used for
      # the interactive Spotify / Tidal logins.
      - "5176:5176"
    depends_on:
      - web
      - backend
      - onthespot

volumes:
  otsconfig:
  otsdownloads:
  aligncache:
  hfcache:
