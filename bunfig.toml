# Test layout: every test for a feature lives in that feature's `test/`
# subfolder, i.e. `src/<feature>/test/`. Unit tests keep the `.test.ts`
# suffix; Playwright e2e specs use `.e2e.ts` and sit in the same `test/`
# folder.
#
# `bun test` discovery is suffix-based, it matches `.test`/`.spec`/`_test_`/
# `_spec_` in the filename under `root` (there is no testMatch glob in
# bunfig, and the positional path filter is not a `**` glob). So the
# `test/`-folder convention is enforced by placement: all `*.test.ts` live
# under a `test/` folder, and a bare `bun test` finds exactly those. The
# `.e2e.ts` suffix has no `.test`/`.spec`, so the Playwright specs stay
# invisible to `bun test`; Playwright's `testMatch` (playwright.config.ts)
# only matches `*.e2e.ts`, so the two runners never overlap even though they
# now share the `test/` folder.
[test]
root = "frontend/src"
